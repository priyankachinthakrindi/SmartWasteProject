<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Bin Status</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f7f9;
        }

        header {
            background-color: #2e8b57;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background-color: #333;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: #2e8b57;
        }

        .container {
            padding: 40px;
            text-align: center;
        }

        .card {
            background: white;
            margin: auto;
            padding: 30px;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }

        .card h2 {
            color: #2e8b57;
        }

        .status {
            margin: 15px 0;
            font-size: 18px;
        }

        .progress-bar {
            width: 100%;
            background-color: #ddd;
            border-radius: 20px;
            overflow: hidden;
        }

        .progress {
            height: 20px;
            width: 70%;
            background-color: #2e8b57;
            text-align: center;
            color: white;
            line-height: 20px;
        }

        footer {
            margin-top: 40px;
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>

<body>

    <header>
        <h2>Smart Waste Segregation System</h2>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="bin.html">Bin Status</a>
        <a href="guide.html">Segregation Guide</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="report.html">Report Issue</a>
    </nav>

    <div class="container">
        <div class="card">
            <h2>Bin Status</h2>

            <div class="status">
                <strong>Waste Type:</strong> Wet Waste
            </div>

            <div class="status">
                <strong>Fill Level:</strong>
            </div>

            <div class="progress-bar">
                <div class="progress">70%</div>
            </div>

            <div class="status">
                <strong>Status:</strong> Active
            </div>

            <div class="status">
                <strong>Last Collected:</strong> Today, 9:00 AM
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 Smart Waste Segregation Project</p>
    </footer>

</body>

</html>
