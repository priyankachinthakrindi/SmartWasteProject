<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #a8e063, #56ab2f);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: white;
            padding: 40px;
            width: 320px;
            border-radius: 15px;
            box-shadow: 0px 10px 25px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .login-box h2 {
            color: #2e8b57;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #2e8b57;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #256f46;
        }

        .link {
            margin-top: 10px;
            font-size: 14px;
        }

        .link a {
            text-decoration: none;
            color: #2e8b57;
        }
    </style>
</head>

<body>

    <div class="login-box">
        <h2>User Login</h2>

        <input type="text" placeholder="Enter Username">

        <input type="password" placeholder="Enter Password">

        <button onclick="login()">Login</button>

        <div class="link">
            <p>Don't have an account? <a href="#">Register</a></p>
        </div>
    </div>

    <script>
        function login() {
            alert("Login Successful!");
            window.location.href = "index.html";
        }
    </script>

</body>

</html>
