<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #a8e063, #56ab2f);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: white;
            padding: 40px;
            width: 320px;
            border-radius: 15px;
            box-shadow: 0px 10px 25px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .login-box h2 {
            color: #2e8b57;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        .login-btn {
            display: block;
            width: 100%;
            padding: 12px;
            background-color: #2e8b57;
            color: white;
            border-radius: 8px;
            text-align: center;
            text-decoration: none;
            font-size: 16px;
        }

        .login-btn:hover {
            background-color: #256f46;
        }
    </style>
</head>

<body>

    <div class="login-box">
        <h2>User Login</h2>

        <input type="text" placeholder="Enter Username">
        <input type="password" placeholder="Enter Password">

        <!-- DIRECT NAVIGATION (WORKING) -->
        <a href="home.html" class="login-btn">Login</a>

    </div>

</body>

</html>
