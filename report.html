<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Report Issue</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #fce4ec, #e8f5e9);
        }

        header {
            background-color: #2e8b57;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background-color: #333;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: #2e8b57;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80vh;
        }

        .form-box {
            background: white;
            padding: 30px;
            width: 350px;
            border-radius: 15px;
            box-shadow: 0px 5px 20px rgba(0, 0, 0, 0.2);
        }

        .form-box h2 {
            text-align: center;
            color: #2e8b57;
            margin-bottom: 20px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        textarea {
            resize: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #2e8b57;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #256f46;
        }

        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px;
            position: fixed;
            width: 100%;
            bottom: 0;
        }
    </style>
</head>

<body>

    <header>
        <h2>Smart Waste Segregation System</h2>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="bin.html">Bin Status</a>
        <a href="guide.html">Segregation Guide</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="report.html">Report Issue</a>
    </nav>

    <div class="container">
        <div class="form-box">
            <h2>Report an Issue</h2>

            <input type="text" placeholder="Enter your name">

            <select>
                <option>Select Issue Type</option>
                <option>Bin Overflow</option>
                <option>Damaged Bin</option>
                <option>Missed Collection</option>
            </select>

            <textarea rows="4" placeholder="Describe the issue..."></textarea>

            <button onclick="submitForm()">Submit</button>
        </div>
    </div>

    <footer>
        <p>© 2026 Smart Waste Segregation Project</p>
    </footer>

    <script>
        function submitForm() {
            alert("Issue submitted successfully!");
        }
    </script>

</body>

</html>
